# netlify.toml
# Tells Netlify where your functions live and sets up redirects.

[build]
  publish = "."          # serve files from the root
  functions = "netlify/functions"

# Redirect /api/* calls to the functions — keeps URLs clean in main.js
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200
