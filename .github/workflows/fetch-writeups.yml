name: Fetch GitBook Writeups

on:
  schedule:
    - cron: '0 0 * * *'   # runs nightly at midnight UTC
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch writeups from GitBook API
        env:
          GITBOOK_TOKEN: ${{ secrets.GITBOOK_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request
          import json
          import os

          TOKEN    = os.environ['GITBOOK_TOKEN']
          SPACE_ID = 'G0kFByBNfwLPv4rlK2fH'
          BASE_URL = f'https://api.gitbook.com/v1/spaces/{SPACE_ID}'

          headers = {
              'Authorization': f'Bearer {TOKEN}',
              'Content-Type': 'application/json'
          }

          def api_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def fetch_page_json(page_id):
              """Fetch full page JSON to get cover image URL."""
              try:
                  url = f'{BASE_URL}/content/page/{page_id}'
                  req = urllib.request.Request(url, headers={
                      **headers,
                      'Accept': 'application/json'
                  })
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f'  Warning: could not fetch page JSON for {page_id}: {e}')
                  return {}

          GITHUB_RAW = 'https://raw.githubusercontent.com/Kieboard/CTF-Hub/gitbook'

          def fetch_markdown(git_path):
              """Fetch markdown from GitHub raw — already synced from GitBook."""
              try:
                  url = f'{GITHUB_RAW}/{git_path}'
                  req = urllib.request.Request(url)
                  with urllib.request.urlopen(req) as r:
                      return r.read().decode('utf-8')
              except Exception as e:
                  print(f'  Warning: could not fetch markdown for {git_path}: {e}')
                  return ''

          def parse_markdown_meta(markdown):
              """Parse tags and date from the markdown header block."""
              import re
              tags = []
              date = ''
              tag_match = re.search(r'Tags?:\s*(.+)', markdown, re.IGNORECASE)
              if tag_match:
                  raw = tag_match.group(1)
                  tags = [t.lstrip('#').strip().lower() for t in raw.split() if t.startswith('#')]
              date_match = re.search(r'Date:\s*(.+)', markdown, re.IGNORECASE)
              if date_match:
                  date = date_match.group(1).strip()
              return tags, date

          def extract_images(markdown):
              """Extract and preserve image URLs from markdown/HTML content."""
              import re
              images = []
              # Find img tags with src attributes (including Gyazo, GitHub, etc.)
              img_pattern = r'<img[^>]*src=["\']([^"\']+)["\'][^>]*>'
              images = re.findall(img_pattern, markdown)
              return images

          def walk_pages(pages, platform='TryHackMe', difficulty='medium', writeups=None):
              if writeups is None:
                  writeups = []

              for page in pages:
                  title    = page.get('title', '').strip()
                  slug     = page.get('slug', '').strip()
                  path     = page.get('path', '').lower()
                  page_id  = page.get('id', '')
                  children = page.get('pages', [])
                  raw_tags = page.get('tags', [])
                  tags     = [t.get('label', str(t)) if isinstance(t, dict) else str(t)
                              for t in raw_tags]

                  if not title or not slug:
                      continue

                  if 'tryhackme' in path:
                      current_platform = 'TryHackMe'
                  elif 'hackthebox' in path or 'htb' in path:
                      current_platform = 'HackTheBox'
                  elif 'letsdefend' in path:
                      current_platform = 'LetsDefend'
                  elif 'vulnhub' in path:
                      current_platform = 'VulnHub'
                  else:
                      current_platform = platform

                  title_lower = title.lower()
                  if 'easy' in path or 'easy' in title_lower or 'beginner' in title_lower:
                      current_difficulty = 'easy'
                  elif 'hard' in path or 'hard' in title_lower or 'insane' in title_lower:
                      current_difficulty = 'hard'
                  elif 'medium' in path or 'medium' in title_lower:
                      current_difficulty = 'medium'
                  else:
                      current_difficulty = difficulty

                  # Skip non-writeup structural pages
                  skip_path_segments = {'extras', 'cheatsheets'}
                  skip_path_endings  = {
                      'easy', 'medium', 'hard', 'insane', 'beginner',
                      'linux', 'windows', 'other',
                      'sherlocks', 'challenges', 'machines',
                      'tryhackme', 'hackthebox', 'letsdefend', 'vulnhub',
                      'platforms', 'writeups', 'readme', 'home', 'welcome',
                      'about', 'about-me', 'hub', 'introduction', 'intro'
                  }
                  path_parts = set(path.strip('/').split('/'))
                  path_end   = path.rstrip('/').split('/')[-1] if path else ''
                  # Leaf = no children, deep enough path, not under extras/cheatsheets, not a known category page
                  path_depth = len([p for p in path.strip('/').split('/') if p])
                  is_leaf = (len(children) == 0
                             and path_depth >= 4
                             and path_end not in skip_path_endings
                             and not path_parts.intersection(skip_path_segments))

                  if is_leaf:
                      git_path = page.get('git', {}).get('path', '')
                      print(f'  Fetching: {title} ({git_path})')
                      markdown      = fetch_markdown(git_path) if git_path else ''
                      md_tags, date = parse_markdown_meta(markdown)
                      images        = extract_images(markdown)

                      # Cover image — PNG stored alongside the markdown in CTF-Hub repo
                      # The PNG filename may differ from the MD filename, so fetch the dir listing
                      cover_url = None
                      if git_path:
                          try:
                              dir_path = '/'.join(git_path.split('/')[:-1])
                              api_url = f'https://api.github.com/repos/Kieboard/CTF-Hub/contents/{dir_path}?ref=gitbook'
                              dir_req = urllib.request.Request(api_url, headers={'User-Agent': 'kieboard-pipeline'})
                              with urllib.request.urlopen(dir_req) as r:
                                  dir_data = json.loads(r.read())
                              pngs = [f['download_url'] for f in dir_data if f['name'].lower().endswith('.png')]
                              if pngs:
                                  cover_url = pngs[0]
                          except Exception as e:
                              print(f'  Warning: could not fetch cover for {title}: {e}')

                      # HTB category from path
                      htb_type = None
                      if 'sherlocks' in path:
                          htb_type = 'Sherlock'
                      elif 'challenges' in path:
                          htb_type = 'Challenge'
                      elif 'machines' in path:
                          htb_type = 'Machine'

                      writeups.append({
                          'title':      title,
                          'platform':   current_platform,
                          'difficulty': current_difficulty,
                          'tags':       md_tags,
                          'date':       date,
                          'cover':      cover_url,
                          'markdown':   markdown,
                          'images':     images,
                          'htb_type':   htb_type,
                      })

                  if children:
                      walk_pages(children, current_platform, current_difficulty, writeups)

              return writeups

          data = api_get(f'{BASE_URL}/content')
          top_pages = data.get('pages', [])
          writeups = walk_pages(top_pages)

          print(f'Found {len(writeups)} writeups')
          for w in writeups:
              tag_str = ', '.join(w['tags']) if w['tags'] else 'none'
              cover_str = 'yes' if w['cover'] else 'no'
              print(f"  [{w['platform']}] [{w['difficulty']}] {w['title']} — tags: {tag_str} — cover: {cover_str} — {len(w['markdown'])} chars")

          out = json.dumps(writeups, indent=2)
          with open('writeups.json', 'w') as f:
              f.write(out)

          print(f'Wrote {len(writeups)} writeups to writeups.json')
          PYEOF

      - name: Fetch TryHackMe stats
        run: |
          python3 - <<'PYEOF'
          import urllib.request
          import json

          try:
              url = 'https://tryhackme.com/api/user/Kieboard'
              req = urllib.request.Request(url, headers={'User-Agent': 'kieboard-pipeline'})
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())

              # Extract stats from API response
              rank_str  = data.get('globalRank', data.get('rank', ''))
              rooms     = data.get('completedRooms', data.get('rooms', 0))
              badges    = data.get('badges', [])
              badge_count = len(badges) if isinstance(badges, list) else badges
              streak    = data.get('dailyStreak', data.get('streak', None))

              # Format rank as "Top X%"
              if isinstance(rank_str, (int, float)) and rank_str > 0:
                  rank_display = f"Top {rank_str}%"
              elif isinstance(rank_str, str) and rank_str:
                  rank_display = rank_str if rank_str.startswith('Top') else f"Top {rank_str}%"
              else:
                  rank_display = None

              stats = {
                  'rank':   rank_display,
                  'rooms':  rooms if rooms else None,
                  'badges': badge_count if badge_count else None,
                  'streak': streak if streak is not None else None,
              }

              # Remove None values so fallback to hardcoded values works
              stats = {k: v for k, v in stats.items() if v is not None}

              print(f"THM stats: {stats}")
              with open('thm-stats.json', 'w') as f:
                  json.dump(stats, f)
          except Exception as e:
              print(f"Warning: could not fetch THM stats: {e}")
              # Don't fail the workflow — just skip
          PYEOF

      - name: Fetch TryHackMe badges
        run: |
          python3 - <<'PYEOF'
          import urllib.request
          import json
          import re
          from html.parser import HTMLParser

          class BadgeParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.badges = []
                  self.in_badge = False
                  self.current_badge = {}
                  self.tag_stack = []

              def handle_starttag(self, tag, attrs):
                  self.tag_stack.append(tag)
                  attrs_dict = dict(attrs)

                  if tag == 'div' and 'data-badge-name' in attrs_dict:
                      self.in_badge = True
                      self.current_badge = {
                          'name': attrs_dict.get('data-badge-name', ''),
                          'image': attrs_dict.get('data-badge-img', '')
                      }
                  elif self.in_badge and tag == 'p' and 'data-badge-desc' in attrs_dict:
                      self.current_badge['description'] = attrs_dict.get('data-badge-desc', '')
                  elif self.in_badge and tag == 'span' and 'data-badge-date' in attrs_dict:
                      self.current_badge['earned'] = attrs_dict.get('data-badge-date', '')

              def handle_endtag(self, tag):
                  if self.tag_stack and self.tag_stack[-1] == tag:
                      self.tag_stack.pop()
                  if tag == 'div' and self.in_badge and self.current_badge.get('name'):
                      self.badges.append(self.current_badge)
                      self.in_badge = False
                      self.current_badge = {}

          try:
              url = 'https://tryhackme.com/p/Kieboard?tab=badges'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=10) as r:
                  html = r.read().decode('utf-8')

              # Fallback: extract badge data using regex patterns
              # Looking for badge img src and data attributes
              badges = []

              # Pattern: find badge containers with image URLs and metadata
              badge_img_pattern = r'src="(https://assets\.tryhackme\.com/img/badges/[^"]+)"'
              badge_name_pattern = r'alt="([^"]+)"'

              images = re.findall(badge_img_pattern, html)

              # For each badge image found, try to extract name from nearby alt text
              for match in re.finditer(r'<img[^>]*src="(https://assets\.tryhackme\.com/img/badges/[^"]+)"[^>]*alt="([^"]+)"', html):
                  image_url = match.group(1)
                  alt_text = match.group(2)

                  # Extract badge slug from URL (e.g., "linux" from "...badges/linux.png")
                  slug = image_url.split('/')[-1].replace('.png', '')

                  badges.append({
                      'name': alt_text,
                      'image': image_url,
                      'slug': slug,
                      'earned': None  # Will try to extract from nearby text
                  })

              # Remove duplicates by slug
              unique_badges = {}
              for badge in badges:
                  if badge['slug'] not in unique_badges:
                      unique_badges[badge['slug']] = badge

              badges = list(unique_badges.values())

              print(f"Found {len(badges)} badges")
              for b in badges:
                  print(f"  {b['name']} — {b['image']}")

              with open('thm-badges.json', 'w') as f:
                  json.dump(badges, f, indent=2)

          except Exception as e:
              print(f"Warning: could not fetch badges: {e}")
              # Create empty badges file
              with open('thm-badges.json', 'w') as f:
                  json.dump([], f)
          PYEOF

      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add writeups.json thm-stats.json thm-badges.json
          git diff --staged --quiet || git commit -m "chore: update writeups, THM stats, and badges [skip ci]"
          git push
